name: STRONG TV Refresh Streams
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install yt-dlp and Deno
        run: |
          pip install yt-dlp
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "DENO_INSTALL=$HOME/.deno" >> $GITHUB_ENV
          echo "$HOME/.deno/bin" >> $GITHUB_PATH
          deno --version
          yt-dlp --version
      - name: Resolve streams
        run: |
          export PATH="$DENO_INSTALL/bin:$PATH"
          python resolve_streams.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add streams.json
          git diff --staged --quiet || git commit -m "Refresh streams"
          git push